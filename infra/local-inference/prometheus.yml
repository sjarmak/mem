# Scrapes both engines' OpenAI-server /metrics plus DCGM's GPU metrics. The engine
# jobs stay listed even when their profile is down — Prometheus just marks the target
# down, so flipping `--profile vllm` ↔ `--profile sglang` needs no config change.
global:
  scrape_interval: 2s          # fine-grained: KV pressure moves fast under load
  evaluation_interval: 5s

scrape_configs:
  - job_name: vllm
    metrics_path: /metrics
    static_configs:
      - targets: ["vllm:8000"]
        labels: { engine: vllm }

  - job_name: sglang
    metrics_path: /metrics
    static_configs:
      - targets: ["sglang:8000"]
        labels: { engine: sglang }

  - job_name: dcgm
    static_configs:
      - targets: ["dcgm-exporter:9400"]
